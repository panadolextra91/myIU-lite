name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  ci:
    name: ci
    runs-on: ubuntu-latest
    
    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_USER: myiu
          POSTGRES_PASSWORD: myiu
          POSTGRES_DB: myiu_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U myiu"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgres://myiu:myiu@localhost:5432/myiu_test?sslmode=disable
      JWT_SECRET: test-secret
      CLOUDINARY_URL: cloudinary://test:test@test

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.24'

      - name: Install golang-migrate CLI
        run: go install -tags 'postgres' github.com/golang-migrate/migrate/v4/cmd/migrate@latest
        
      - name: Run Database Migrations
        working-directory: backend
        run: $(go env GOPATH)/bin/migrate -path db/migrations -database "$DATABASE_URL" up

      - name: Run golangci-lint
        uses: golangci/golangci-lint-action@v6
        with:
          working-directory: backend
          # Pinned to match the local pin (.claude/CLAUDE.md / scripts/check.sh).
          # `latest` here silently drifts ahead of local and flags issues a passing
          # pre-push never saw. Bump both together.
          version: v1.64.8
          args: --timeout=5m

      - name: Run Go Tests
        working-directory: backend
        # -p 1: the integration tests share ONE Postgres. The assignments same-tx
        # rollback test briefly RENAMEs the notifications table globally; running
        # package binaries in parallel races that window against other packages'
        # notification inserts ("relation notifications does not exist"). Serialize
        # package binaries to keep the shared DB consistent. KEEP IN SYNC with check.sh.
        run: go test -p 1 -count=1 ./...

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Frontend Checks
        working-directory: frontend
        run: |
          npm ci
          npm run lint
          npm run build
