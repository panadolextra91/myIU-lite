services:
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_USER: myiu
      POSTGRES_PASSWORD: myiu
      POSTGRES_DB: myiu_dev
    ports: ["5432:5432"]
    volumes: ["pgdata:/var/lib/postgresql/data"]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U myiu -d myiu_dev"]
      interval: 10s
      timeout: 5s
      retries: 5
volumes:
  pgdata:
